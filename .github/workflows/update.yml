name: Update Live Camera URL

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update-url:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run extraction script
      run: python get_live.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # live.json の状態を強制的にインデックスに追加
        git add live.json
        
        # 変更がある場合のみコミットしてプッシュ（空コミット防止）
        if ! git diff --cached --quiet; then
          git commit -m "Update live.json URL by GitHub Action"
          git push origin HEAD
          echo "リポジトリへのプッシュが完了しました。"
        else
          echo "ファイルに変更がなかったため、プッシュをスキップしました。"
        fi
